name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-go:
    name: Ingestion (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Test
        working-directory: services/ingestion
        run: |
          go mod download
          go test -race -coverprofile=coverage.out ./...

  test-python:
    name: Embedding + Agent (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Test embedding service
        working-directory: services/embedding
        run: |
          pip install -r requirements.txt
          pytest tests/
      - name: Test agent service
        working-directory: services/agent
        run: |
          pip install -r requirements.txt

  test-java:
    name: RAG Gateway (Java)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Test
        working-directory: services/rag-gateway
        run: ./gradlew test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Python
        run: |
          pip install ruff
          ruff check services/embedding services/agent
